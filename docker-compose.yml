# ─────────────────────────────────────────────────────────────────────────────
# Mike — local development Docker Compose
#
# Starts a fully self-hosted stack with no external service dependencies:
#   db       – Postgres + Supabase auth schema (supabase/postgres)
#   auth     – GoTrue (Supabase-compatible auth API)
#   rest     – PostgREST (database REST API used by the Supabase JS client)
#   kong     – Nginx API gateway  (SUPABASE_URL points here)
#   minio    – S3-compatible object storage
#   minio-init – creates the MinIO bucket on first run
#   backend  – Mike Express API (built from source)
#   frontend – Mike Next.js app (built from source)
#
# Usage:
#   cp .env.example .env          # fill in required values
#   docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Postgres with Supabase auth schema ──────────────────────────────────────
  db:
    image: supabase/postgres:15.6.1.143
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
      # supabase/postgres uses this to set passwords for internal roles
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data/pgdata
      # App schema runs after the Supabase internal schema (alphabetical order)
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/20_app_schema.sql:ro
      - ./db/init/30_permissions.sql:/docker-entrypoint-initdb.d/30_permissions.sql:ro
    ports:
      - "5432:5432"

  # ── GoTrue — Supabase-compatible auth service ───────────────────────────────
  auth:
    image: supabase/gotrue:v2.151.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      GOTRUE_API_HOST: "0.0.0.0"
      GOTRUE_API_PORT: "9999"
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: "postgresql://supabase_auth_admin:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres?sslmode=disable&search_path=auth"
      GOTRUE_SITE_URL: ${SITE_URL:-http://localhost:3000}
      GOTRUE_URI_ALLOW_LIST: "*"
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: "3600"
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM:-true}
      GOTRUE_SMTP_HOST: ${SMTP_HOST:-}
      GOTRUE_SMTP_PORT: ${SMTP_PORT:-587}
      GOTRUE_SMTP_USER: ${SMTP_USER:-}
      GOTRUE_SMTP_PASS: ${SMTP_PASS:-}
      GOTRUE_SMTP_ADMIN_EMAIL: ${SMTP_ADMIN_EMAIL:-admin@example.com}
      GOTRUE_SMTP_SENDER_NAME: ${SMTP_SENDER_NAME:-Mike}
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
      GOTRUE_LOG_LEVEL: warn
      GOTRUE_DISABLE_SIGNUP: "false"
      API_EXTERNAL_URL: ${API_EXTERNAL_URL:-http://localhost:8000}

  # ── PostgREST — database REST API ───────────────────────────────────────────
  rest:
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: "postgresql://authenticator:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres"
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_SERVER_CORS_ALLOWED_ORIGINS: "*"
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: "3600"

  # ── Nginx API gateway ────────────────────────────────────────────────────────
  kong:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      auth:
        condition: service_healthy
      rest:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8000:8000"

  # ── MinIO — S3-compatible object storage ────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # ── MinIO bucket initializer ─────────────────────────────────────────────────
  minio-init:
    image: minio/mc:RELEASE.2024-06-20T17-26-35Z
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./scripts/init-minio.sh:/init-minio.sh:ro
    entrypoint: ["/bin/sh", "/init-minio.sh"]
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET_NAME: ${R2_BUCKET_NAME:-mike}

  # ── Mike backend ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      kong:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SUPABASE_URL: http://kong:8000
      SUPABASE_SECRET_KEY: ${SERVICE_ROLE_KEY}
      R2_ENDPOINT_URL: http://minio:9000
      R2_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      R2_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-mike}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}

  # ── Mike frontend ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # Browser-accessible URLs (baked into the Next.js bundle at build time)
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:8000}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${ANON_KEY}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
    restart: unless-stopped
    depends_on:
      kong:
        condition: service_healthy
      backend:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      # Runtime env vars (server-side only, not NEXT_PUBLIC_)
      SUPABASE_SECRET_KEY: ${SERVICE_ROLE_KEY}

volumes:
  db_data:
  minio_data:
