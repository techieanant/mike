# Nginx API gateway — routes Supabase-protocol paths to self-hosted services.
#
#   /auth/v1/*  →  GoTrue (supabase/gotrue) on port 9999
#   /rest/v1/*  →  PostgREST on port 3000
#
# The trailing slash in proxy_pass strips the location prefix so that
# /auth/v1/token  →  http://auth:9999/token  (GoTrue native path)
# /rest/v1/projects  →  http://rest:3000/projects  (PostgREST native path)

# Shared CORS macro — add to every proxied location.
# $http_origin is the actual Origin header; fall back to * for non-browser clients.
map $http_origin $cors_origin {
    default                        "*";
    "~^http://localhost(:[0-9]+)?$" "$http_origin";
    "~^http://127\.0\.0\.1(:[0-9]+)?$" "$http_origin";
}

server {
    listen 8000;

    # Health probe used by Docker healthcheck
    location /health {
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # GoTrue (auth)
    location /auth/v1/ {
        # Handle CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, apikey, Content-Type, X-Client-Info, X-Supabase-Api-Version" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Headers     "Authorization, apikey, Content-Type, X-Client-Info, X-Supabase-Api-Version" always;

        proxy_pass         http://auth:9999/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
    }

    # PostgREST (database REST API)
    location /rest/v1/ {
        # Handle CORS preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, apikey, Content-Type, Prefer, X-Client-Info" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400 always;
            return 204;
        }

        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Headers     "Authorization, apikey, Content-Type, Prefer, X-Client-Info" always;

        proxy_pass         http://rest:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
    }
}
