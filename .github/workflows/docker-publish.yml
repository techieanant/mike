name: Publish Docker images to GHCR

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: ./backend
            image: ghcr.io/techieanant/mike-backend
            build_args: ""
          - service: frontend
            context: ./frontend
            image: ghcr.io/techieanant/mike-frontend
            # Placeholder values so `next build` can complete in CI.
            # NEXT_PUBLIC_* vars are baked in at build time; operators
            # should rebuild the image with real values for production,
            # or use the docker-compose setup which passes them as ARGs.
            build_args: |
              NEXT_PUBLIC_SUPABASE_URL=http://localhost:8000
              NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY=placeholder-build-time-key
              NEXT_PUBLIC_API_BASE_URL=http://localhost:3001

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            # Tag with git SHA on every push
            type=sha,format=short
            # Tag with branch name (e.g. main)
            type=ref,event=branch
            # Tag latest only on the default branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag semver releases (e.g. v1.2.3 → 1.2.3, 1.2, 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
